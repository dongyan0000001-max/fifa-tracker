name: Build FIFA tracker

on:
  push:
    branches:
      - main
    paths:
      - "data/**"
      - "scripts/**"
      - "assets/**"
      - "package.json"
      - ".github/workflows/build-tracker.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build site
        run: npm run build

      - name: Commit built pages
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .
            git commit -m "Build tracker site"
            git push
          else
            echo "No generated changes to commit."
          fi
